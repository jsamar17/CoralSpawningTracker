<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug — Coral Spawning Tracker</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/reef_favicon.png') }}?v=3">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { overflow: auto; height: auto; }
        .debug-page { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
        .debug-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
        .debug-header h2 { margin: 0; }
        .debug-header a { font-size: 0.9rem; }
        .debug-card {
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 1.25rem; margin-bottom: 1.25rem;
        }
        .debug-card h5 { margin-bottom: 1rem; color: var(--accent-secondary); }
        #debug-map { height: 300px; border-radius: 6px; border: 1px solid var(--border-color); }
        .seed-controls { display: flex; gap: 0.75rem; align-items: end; flex-wrap: wrap; margin-top: 1rem; }
        .seed-controls .form-label { margin-bottom: 0.25rem; }
        .table-container { overflow-x: auto; }
        .table-container table { font-size: 0.85rem; }
        .table-container th { white-space: nowrap; }
        .table-container td { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .pagination-controls { display: flex; align-items: center; justify-content: space-between; margin-top: 1rem; }
        .status-badge {
            display: inline-block; padding: 0.15rem 0.4rem; border-radius: 8px;
            font-size: 0.75rem; font-weight: 600;
        }
        .status-approved { background: #2d6a4f; color: #b7e4c7; }
        .status-pending { background: #7f5539; color: #ffd6a5; }
        .status-rejected { background: #6a040f; color: #ffb3b3; }
        .coord-cell { font-family: monospace; font-size: 0.8rem; }
        .action-btn { padding: 0.2rem 0.5rem; font-size: 0.75rem; }
    </style>
</head>
<body>
    <div class="debug-page">
        <div class="debug-header">
            <a href="/" style="color: var(--accent-secondary); text-decoration: none;">
                <i class="fas fa-arrow-left me-1"></i>Back to Search
            </a>
            <h2><i class="fas fa-bug me-2"></i>Debug Console</h2>
        </div>

        <!-- Seed / Clear Controls -->
        <div class="debug-card">
            <h5><i class="fas fa-database me-2"></i>Data Management</h5>
            <div class="row">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Center Point (click map or enter coordinates)</label>
                    <div id="debug-map"></div>
                    <div class="row g-2 mt-2">
                        <div class="col-6">
                            <label for="debug-lat" class="form-label">Latitude</label>
                            <input type="number" step="any" class="form-control form-control-sm" id="debug-lat" value="-15.0">
                        </div>
                        <div class="col-6">
                            <label for="debug-lon" class="form-label">Longitude</label>
                            <input type="number" step="any" class="form-control form-control-sm" id="debug-lon" value="147.0">
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="seed-controls">
                        <div>
                            <label for="seed-count" class="form-label">Points to seed</label>
                            <input type="number" class="form-control form-control-sm" id="seed-count" value="100" min="1" max="1000">
                        </div>
                        <div>
                            <label for="seed-radius" class="form-label">Radius (km)</label>
                            <input type="number" class="form-control form-control-sm" id="seed-radius" value="50" min="1" max="500">
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-3">
                        <button class="btn btn-primary" id="seed-btn">
                            <i class="fas fa-seedling me-1"></i>Seed Data
                        </button>
                        <button class="btn btn-danger" id="clear-btn">
                            <i class="fas fa-trash me-1"></i>Clear All Submissions
                        </button>
                    </div>
                    <div id="action-status" class="mt-2" style="font-size: 0.85rem;"></div>
                </div>
            </div>
        </div>

        <!-- Submissions Table -->
        <div class="debug-card">
            <h5><i class="fas fa-list me-2"></i>User Submissions <span id="total-count" class="text-muted" style="font-size: 0.85rem;"></span></h5>
            <div class="table-container">
                <table class="table table-dark table-striped table-hover mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Genus</th>
                            <th>Species</th>
                            <th>Location</th>
                            <th>Lat</th>
                            <th>Lon</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>FM Days</th>
                            <th>Gamete</th>
                            <th>Submitted By</th>
                            <th>Submitted At</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="submissions-tbody"></tbody>
                </table>
            </div>
            <div class="pagination-controls">
                <span id="page-info" class="text-muted" style="font-size: 0.85rem;"></span>
                <div class="btn-group btn-group-sm">
                    <button class="btn btn-outline-secondary" id="prev-btn" disabled>
                        <i class="fas fa-chevron-left"></i> Prev
                    </button>
                    <button class="btn btn-outline-secondary" id="next-btn" disabled>
                        Next <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{{ url_for('static', filename='js/debug.js') }}"></script>
</body>
</html>
